name: Mobile Build Dispatcher

on:
  workflow_dispatch:
    inputs:
      job_id:        { description: 'Build job ID',          required: true,  type: string }
      source_url:    { description: 'Source web app URL',    required: true,  type: string }
      package_id:    { description: 'Package ID',            required: true,  type: string }
      display_name:  { description: 'App display name',      required: true,  type: string }
      icon_url:      { description: 'App icon URL',          required: false, type: string }
      splash_color:  { description: 'Splash color',          required: false, type: string }
      orientation:   { description: 'Orientation',           required: false, type: string }
      formats:       { description: 'apk,aab',               required: true,  type: string }
      version_name:  { description: 'Version name',          required: true,  type: string }
      version_code:  { description: 'Version code',          required: true,  type: string }
      callback_url:  { description: 'Callback URL',          required: true,  type: string }

concurrency:
  group: build-${{ github.event.inputs.job_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      JOB_ID:        ${{ github.event.inputs.job_id }}
      SOURCE_URL:    ${{ github.event.inputs.source_url }}
      PACKAGE_ID:    ${{ github.event.inputs.package_id }}
      DISPLAY_NAME:  ${{ github.event.inputs.display_name }}
      ICON_URL:      ${{ github.event.inputs.icon_url }}
      SPLASH_COLOR:  ${{ github.event.inputs.splash_color }}
      ORIENTATION:   ${{ github.event.inputs.orientation }}
      FORMATS:       ${{ github.event.inputs.formats }}
      VERSION_NAME:  ${{ github.event.inputs.version_name }}
      VERSION_CODE:  ${{ github.event.inputs.version_code }}
      CALLBACK_URL:  ${{ github.event.inputs.callback_url }}
      CALLBACK_SECRET: ${{ secrets.BUILDER_CALLBACK_SECRET }}
      KEYSTORE_B64:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS:       ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASS:        ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Acknowledge dispatch
        run: |
          curl -s -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "x-job-id: $JOB_ID" \
            -H "x-format: status" \
            -d "{\"status\":\"acknowledged\"}" || true

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - uses: android-actions/setup-android@v3
        with: { cmdline-tools-version: '11076708' }

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null

      - name: Scaffold Capacitor project
        run: |
          set -euo pipefail
          mkdir -p app && cd app
          npm init -y >/dev/null
          npm pkg set name="puvio-shell" private=true >/dev/null
          npm install --no-audit --no-fund \
            @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 >/dev/null

          mkdir -p www
          cat > www/index.html <<HTML
          <!doctype html><meta http-equiv="refresh" content="0; url=${SOURCE_URL}">
          <title>${DISPLAY_NAME}</title>
          HTML

          SAFE_NAME=$(printf '%s' "$DISPLAY_NAME" | sed 's/"/\\"/g')
          cat > capacitor.config.json <<JSON
          {
            "appId": "${PACKAGE_ID}",
            "appName": "${SAFE_NAME}",
            "webDir": "www",
            "server": { "url": "${SOURCE_URL}", "androidScheme": "https", "cleartext": false },
            "android": { "allowMixedContent": false }
          }
          JSON

          npx cap add android
          npx cap sync android

      - name: Apply version + orientation + display name
        working-directory: app/android
        run: |
          set -euo pipefail
          BG=app/build.gradle
          sed -i "s/versionCode .*/versionCode ${VERSION_CODE}/" $BG
          sed -i "s/versionName .*/versionName \"${VERSION_NAME}\"/" $BG
          STR=app/src/main/res/values/strings.xml
          python3 - <<PY
          import re, os
          p="$STR"; n=os.environ["DISPLAY_NAME"]
          s=open(p).read()
          s=re.sub(r'(<string name="app_name">)[^<]*(</string>)', r'\g<1>'+n.replace('&','&amp;')+r'\g<2>', s)
          s=re.sub(r'(<string name="title_activity_main">)[^<]*(</string>)', r'\g<1>'+n.replace('&','&amp;')+r'\g<2>', s)
          open(p,'w').write(s)
          PY
          if [ "${ORIENTATION:-}" = "portrait" ] || [ "${ORIENTATION:-}" = "landscape" ]; then
            MAN=app/src/main/AndroidManifest.xml
            sed -i "s/android:screenOrientation=\"[a-zA-Z]*\"/android:screenOrientation=\"${ORIENTATION}\"/" $MAN || true
            grep -q 'android:screenOrientation' $MAN || \
              sed -i "s|<activity |<activity android:screenOrientation=\"${ORIENTATION}\" |" $MAN
          fi

      - name: Generate launcher icon
        if: ${{ env.ICON_URL != '' }}
        run: |
          set -e
          curl -fsSL "$ICON_URL" -o /tmp/icon.src || exit 0
          sudo apt-get update -qq && sudo apt-get install -y imagemagick >/dev/null
          declare -A SZ=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          RES=app/android/app/src/main/res
          for d in "${!SZ[@]}"; do
            mkdir -p "$RES/mipmap-$d"
            convert /tmp/icon.src -resize "${SZ[$d]}x${SZ[$d]}" "$RES/mipmap-$d/ic_launcher.png"
            convert /tmp/icon.src -resize "${SZ[$d]}x${SZ[$d]}" "$RES/mipmap-$d/ic_launcher_round.png"
            convert /tmp/icon.src -resize "${SZ[$d]}x${SZ[$d]}" "$RES/mipmap-$d/ic_launcher_foreground.png"
          done

      - name: Fetch verified signing secrets
        run: |
          set -euo pipefail
          SIGNING_URL="${CALLBACK_URL%/build-callback}/builder-signing"
          ALT_SIGNING_URL="https://id-preview--a1bc20a6-4187-4566-9a73-6dfd75ce907d.lovable.app/api/public/builder-signing"
          if ! curl -fsSL -H "Authorization: Bearer ${CALLBACK_SECRET}" "$SIGNING_URL" -o "$RUNNER_TEMP/signing.json"; then
            curl -fsSL -H "Authorization: Bearer ${CALLBACK_SECRET}" "$ALT_SIGNING_URL" -o "$RUNNER_TEMP/signing.json"
          fi
          python3 - <<'PY'
          import json, os, uuid
          path = os.path.join(os.environ["RUNNER_TEMP"], "signing.json")
          data = json.load(open(path))
          if not data.get("ok"):
              raise SystemExit(data.get("error") or "signing secret fetch failed")
          mapping = {
              "KEYSTORE_B64": data["keystoreBase64"],
              "KEYSTORE_PASS": data["keystorePassword"],
              "KEY_ALIAS": data["keyAlias"],
              "KEY_PASS": data["keyPassword"],
          }
          with open(os.environ["GITHUB_ENV"], "a") as env:
              for key, value in mapping.items():
                  marker = f"PUVIO_{key}_{uuid.uuid4().hex}"
                  env.write(f"{key}<<{marker}\n{value}\n{marker}\n")
          PY

      - name: Decode keystore
        id: ks
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_B64:-}" ]; then
            echo "::error::Signing keystore is missing"
            echo "has_keystore=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          printf '%s' "$KEYSTORE_B64" | tr -d ' \t\r\n"' | base64 -d > "$RUNNER_TEMP/release.keystore"
          keytool -list -keystore "$RUNNER_TEMP/release.keystore" -storepass "$KEYSTORE_PASS" -alias "$KEY_ALIAS" >/dev/null
          jar --create --file "$RUNNER_TEMP/signing-check.jar" -C "$RUNNER_TEMP" release.keystore
          jarsigner -keystore "$RUNNER_TEMP/release.keystore" -storepass "$KEYSTORE_PASS" -keypass "$KEY_PASS" "$RUNNER_TEMP/signing-check.jar" "$KEY_ALIAS" >/dev/null
          echo "has_keystore=true" >> $GITHUB_OUTPUT
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV

      - name: Configure signing
        if: steps.ks.outputs.has_keystore == 'true'
        working-directory: app/android
        run: |
          cat >> app/build.gradle <<'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file(System.getenv("KEYSTORE_PATH"))
                      storePassword System.getenv("KEYSTORE_PASS")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASS")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          GRADLE

      - name: Build APK
        if: ${{ contains(github.event.inputs.formats, 'apk') }}
        working-directory: app/android
        run: |
          if [ "${{ steps.ks.outputs.has_keystore }}" = "true" ]; then
            ./gradlew :app:assembleRelease --no-daemon
            cp app/build/outputs/apk/release/app-release.apk $RUNNER_TEMP/out.apk
          else
            ./gradlew :app:assembleDebug --no-daemon
            cp app/build/outputs/apk/debug/app-debug.apk $RUNNER_TEMP/out.apk
          fi
          ls -lh $RUNNER_TEMP/out.apk

      - name: Build AAB
        if: ${{ contains(github.event.inputs.formats, 'aab') && steps.ks.outputs.has_keystore == 'true' }}
        working-directory: app/android
        run: |
          ./gradlew :app:bundleRelease --no-daemon
          cp app/build/outputs/bundle/release/app-release.aab $RUNNER_TEMP/out.aab
          ls -lh $RUNNER_TEMP/out.aab

      - name: Upload artifacts to callback
        run: |
          set -e
          post_artifact () {
            local FMT="$1" FILE="$2" CT="$3"
            local SIG
            SIG=$(printf '%s' "${JOB_ID}:${FMT}" | openssl dgst -sha256 -hmac "$CALLBACK_SECRET" -hex | awk '{print $2}')
            echo "POST $FMT ($(stat -c%s "$FILE") bytes) sig=${SIG:0:12}..."
            curl -sS -X POST "$CALLBACK_URL" \
              -H "Content-Type: $CT" \
              -H "x-job-id: $JOB_ID" \
              -H "x-format: $FMT" \
              -H "x-signature: $SIG" \
              --data-binary "@$FILE" \
              -w "\nHTTP %{http_code}\n"
          }
          if [ -f "$RUNNER_TEMP/out.apk" ]; then
            post_artifact apk "$RUNNER_TEMP/out.apk" "application/vnd.android.package-archive"
          fi
          if [ -f "$RUNNER_TEMP/out.aab" ]; then
            post_artifact aab "$RUNNER_TEMP/out.aab" "application/octet-stream"
          fi

      - name: Report failure
        if: failure()
        run: |
          SIG=$(printf '%s' "${JOB_ID}:failed" | openssl dgst -sha256 -hmac "$CALLBACK_SECRET" -hex | awk '{print $2}')
          curl -sS -X POST "$CALLBACK_URL" \
            -H "Content-Type: text/plain" \
            -H "x-job-id: $JOB_ID" \
            -H "x-format: failed" \
            -H "x-signature: $SIG" \
            --data "Build failed in GitHub Actions run ${{ github.run_id }} — see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
