name: Build app

# Lives in the BUILDER repo (e.g. puvio-mobile-builder), NOT in the Puvio app repo.
# Puvio dispatches this via `workflow_dispatch` with the inputs below, and this
# workflow POSTs the signed APK/AAB back to Puvio's callback endpoint.
#
# Required secrets in THIS repo (Settings → Secrets and variables → Actions):
#   BUILDER_CALLBACK_SECRET     same value as the Puvio project secret
#   ANDROID_KEYSTORE_BASE64     base64 of your release .jks
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

on:
  workflow_dispatch:
    inputs:
      job_id:          { required: true,  type: string }
      source_url:      { required: true,  type: string, description: "Git URL of the app to wrap" }
      package_id:      { required: true,  type: string, description: "e.g. app.example.todo" }
      display_name:    { required: true,  type: string }
      icon_url:        { required: false, type: string }
      splash_color:    { required: false, type: string, default: "#0F172A" }
      orientation:     { required: false, type: string, default: "any" }
      formats:         { required: true,  type: string, description: "csv: apk,aab" }
      version_name:    { required: false, type: string, default: "1.0.0" }
      version_code:    { required: false, type: string, default: "1" }
      callback_url:    { required: true,  type: string }

concurrency:
  group: build-${{ inputs.job_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout builder scripts
        uses: actions/checkout@v4

      - name: Clone source app
        run: git clone --depth=1 "${{ inputs.source_url }}" app

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }

      - uses: android-actions/setup-android@v3
        with: { packages: "platforms;android-35 build-tools;35.0.0" }

      - name: Build web bundle
        working-directory: app
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Add Capacitor Android shell
        working-directory: app
        run: |
          bun add -d @capacitor/cli @capacitor/android @capacitor/core
          cat > capacitor.config.json <<EOF
          {
            "appId": "${{ inputs.package_id }}",
            "appName": "${{ inputs.display_name }}",
            "webDir": "dist"
          }
          EOF
          bunx cap add android || echo "already added"
          bunx cap sync android

      - name: Decode release keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/android/keystore
          echo "$KS_B64" | base64 -d > app/android/keystore/release.jks

      - name: Wire signing + version
        env:
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > app/android/key.properties <<EOF
          storeFile=../keystore/release.jks
          storePassword=${KS_PASS}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASS}
          EOF
          GRADLE=app/android/app/build.gradle
          python3 - <<'PY'
          import pathlib
          p = pathlib.Path("app/android/app/build.gradle")
          src = p.read_text()
          if "PUVIO_SIGNING_INJECTED" not in src:
              p.write_text(src + """
          // PUVIO_SIGNING_INJECTED
          def kp = new Properties()
          def kpFile = rootProject.file("key.properties")
          if (kpFile.exists()) { kpFile.withInputStream { kp.load(it) } }
          android {
              signingConfigs { release {
                  if (kp['storeFile']) {
                      storeFile file(kp['storeFile'])
                      storePassword kp['storePassword']
                      keyAlias kp['keyAlias']
                      keyPassword kp['keyPassword']
                  }
              } }
              buildTypes { release { signingConfig signingConfigs.release } }
          }
          """)
          PY
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"${{ inputs.version_name }}\"/" "$GRADLE" || true
          sed -i -E "s/versionCode [0-9]+/versionCode ${{ inputs.version_code }}/" "$GRADLE" || true

      - name: Build APK
        if: contains(inputs.formats, 'apk')
        working-directory: app/android
        run: ./gradlew --no-daemon assembleRelease

      - name: Build AAB
        if: contains(inputs.formats, 'aab')
        working-directory: app/android
        run: ./gradlew --no-daemon bundleRelease

      - name: POST artifacts back to Puvio
        env:
          CB_SECRET: ${{ secrets.BUILDER_CALLBACK_SECRET }}
          CB_URL:    ${{ inputs.callback_url }}
          JOB_ID:    ${{ inputs.job_id }}
          FORMATS:   ${{ inputs.formats }}
        run: |
          set -e
          post_artifact () {
            local fmt="$1"; local file="$2"
            local sig
            sig=$(printf "%s" "${JOB_ID}:${fmt}" | openssl dgst -sha256 -hmac "$CB_SECRET" | awk '{print $2}')
            echo "→ POST $fmt ($(stat -c%s "$file") bytes) to $CB_URL"
            curl -fsSL -X POST "$CB_URL" \
              -H "x-job-id: $JOB_ID" \
              -H "x-format: $fmt" \
              -H "x-signature: $sig" \
              -H "content-type: application/octet-stream" \
              --data-binary "@$file"
          }
          IFS=',' read -ra FMTS <<< "$FORMATS"
          for f in "${FMTS[@]}"; do
            f=$(echo "$f" | xargs)
            case "$f" in
              apk) post_artifact apk "$(find app/android/app/build/outputs/apk/release -name '*.apk' | head -n1)" ;;
              aab) post_artifact aab "$(find app/android/app/build/outputs/bundle/release -name '*.aab' | head -n1)" ;;
              *)   echo "skip $f" ;;
            esac
          done

      - name: Report failure to Puvio
        if: failure()
        env:
          CB_SECRET: ${{ secrets.BUILDER_CALLBACK_SECRET }}
          CB_URL:    ${{ inputs.callback_url }}
          JOB_ID:    ${{ inputs.job_id }}
        run: |
          sig=$(printf "%s" "${JOB_ID}:failed" | openssl dgst -sha256 -hmac "$CB_SECRET" | awk '{print $2}')
          curl -fsSL -X POST "$CB_URL" \
            -H "x-job-id: $JOB_ID" \
            -H "x-format: failed" \
            -H "x-signature: $sig" \
            --data "Build failed in GitHub Actions run ${{ github.run_id }}" || true
